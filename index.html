<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa de Satisfação - VM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <img class="logo" src="imagens/gbanhj1oie9yzcofua8s.png" alt="Logo DataMind Solutions">
        <h1>VM Solutions</h1>
    </header>

    <main>
        <section class="container">
        <h2>Pesquisa de Satisfação do cliente</h2>
        <p>Ajude-nos a melhorar nossos serviços respondendo este formulário</p>

        <form>
            <fieldset>
                <legend>Dados Pessoais</legend>
                <label for="name">Nome:</label>
                <input id="name" type="text" placeholder="Digite seu nome">

                <label for="email">Email:</label>
                <input id="email" type="email" placeholder="Informe seu email">

                <label for="age">Idade</label>
                <input id="age" type="number" min="1" max="120">
            </fieldset>

            <fieldset>
                <legend>Avaliação</legend>

                <label for="service">Como você avalia nosso atendimento?</label> 
                <div class="inline">
                <input name="service" type="radio">Excelente
                <input name="service" type="radio">Bom
                <input name="service" type="radio">Regular
                <input name="service" type="radio">Ruim
                </div>

                <label>Quais serviços voce utilizou?</label>
                <div class="inline">
                <input type="checkbox">Site
                <input type="checkbox">Atendimento
                <input type="checkbox">Entrega
                </div>
            </fieldset>

            <fieldset>
                <legend>Informações Gerais</legend>

                <label>Estado</label> 
                <select>
                    <option>Selecione</option>
                    <option>BA</option>
                    <option>SP</option>
                    <option>RJ</option>
                    <option>MG</option>
                    <option>PE</option>
                </select>

                <label>Sugestões</label>
                <textarea rows="4"></textarea>

                <input type="checkbox">Deseja receber novidades por email?
            </fieldset>

            <button type="reset">Limpar</button>
            <button type="submit">Enviar</button>
        </form>
        </section>
    </main>

</body>
</html>
