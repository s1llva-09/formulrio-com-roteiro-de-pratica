<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa de Satisfação - VM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img class="logo" src="img/logo.png" alt="Logo da empresa">
        <h1>VM Solutions</h1>
    </header>

    <main>
        <section class="container">
            <h2>Pesquisa de Satisfação do Cliente</h2>
            <p>Ajude-nos a melhorar nossos serviços respondendo a este formulário</p>
        
            <form>
                <fieldset>
                    <legend>Dados Pessoais</legend>

                    <label for="name">Nome Completo</label>
                    <input id="name" type="text" placeholder="Digite seu nome"> <br>

                    <label for="email">E-mail</label>
                    <input id="email" type="email" placeholder="Digite seu e-mail"> <br>

                    <label for="age">Idade</label>
                    <input id="age" type="number" min="1" max="120">
                </fieldset>

                <fieldset>
                    <legend>Avaliação</legend>

                    <label>Como você avalia nosso atendimento?</label>
                    <div class="inline">
                        <input id="excelente" name="service" type="radio">
                        <Label id="excelente" for="service">Excelente</Label>
                        
                        <input id="bom" name="service" type="radio">
                        <Label id="bom" for="service">Bom</Label>
                        
                        <input id="regular" name="service" type="radio">
                        <Label id="regular" for="service">Regular</Label>

                        <input id="ruim" name="service" type="radio"> 
                        <Label id="ruim" for="service">Ruim</Label> <br>
                    </div>
                        
                    <label>Quais serviços você utilizou? </label>
                    <div class="inline">
                        <input id="site" type="checkbox">
                        <label for="site">Site</label>
                        
                        <input id="app" type="checkbox">
                        <label for="app">App</label>
                        
                        <input id="atendimento" type="checkbox">
                        <label for="atendimento">Atendimento</label>
                        
                        <input id="entrega" type="checkbox">
                        <label for="entrega">Entrega</label>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Informações Gerais</legend>

                    <label>Estado</label>
                    <select>
                        <option>Selecione</option>
                        <option>BA</option>
                        <option>SP</option>
                        <option>RJ</option>
                        <option>MG</option>
                        <option>PE</option>
                    </select> <br>

                    <label>Sugestões</label>
                    <textarea rows="4"></textarea> <br>

                    <div class="inline">
                        <input type="checkbox"> Desejo receber novidades por e-mail
                    </div>
                </fieldset>

                <div class="botoes">
                    <button type="reset">Limpar</button>
                    <button type="submit">Enviar</button>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
